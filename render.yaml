services:
  - type: web
    name: hotel-maya-bay
    env: php
    buildCommand: composer install --no-dev && php artisan migrate --force
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        fromSecret: APP_KEY
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService: mysql
      - key: DB_DATABASE
        fromSecret: DB_DATABASE
      - key: DB_USERNAME
        fromSecret: DB_USERNAME
      - key: DB_PASSWORD
        fromSecret: DB_PASSWORD
